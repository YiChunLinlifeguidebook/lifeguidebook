name: Legacy Astro Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: Build legacy/astro-prototype
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS 20)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: legacy/astro-prototype/package.json

      - name: Install dependencies
        working-directory: legacy/astro-prototype
        run: npm install

      - name: Build
        working-directory: legacy/astro-prototype
        run: npm run build
